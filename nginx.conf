events {
    worker_connections 1024;
}

http {
    upstream dockerhub {
        server registry-1.docker.io:443;
    }

    proxy_cache_path /var/cache/nginx/docker levels=1:2 keys_zone=docker_cache:10m max_size=10g inactive=60m use_temp_path=off;

    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name localhost;  # Or your domain/IP

        # Self-signed cert for local use (generate with openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/ssl/nginx.key -out /etc/nginx/ssl/nginx.crt)
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

        client_max_body_size 0;
        chunked_transfer_encoding on;
        proxy_read_timeout 900s;

        # Block writes (read-only mirror)
        if ($request_method = POST) { return 405; }
        if ($request_method = PUT) { return 405; }
        if ($request_method = DELETE) { return 405; }

        # Bypass cache for mutable manifests/tags
        location ~ ^/v2/[^/]+/(manifests/(?!sha256:|v2:)|tags/list|_catalog)$ {
            proxy_ssl_server_name on;
            proxy_pass https://dockerhub;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cache everything else
        location / {
            proxy_ssl_server_name on;
            proxy_pass https://dockerhub;
            proxy_cache docker_cache;
            proxy_cache_lock on;
            proxy_cache_valid 200 302 24h;
            proxy_cache_valid 404 1m;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
